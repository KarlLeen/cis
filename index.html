document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:40px\">\n      <div>\n        <div style=\"font-weight:800;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#E8A317;margin-bottom:10px\">Real people, real moments<\u002Fdiv>\n        <h2 style=\"font-family:'Londrina Solid',sans-serif;font-weight:900;font-size:clamp(40px,6vw,72px);line-height:0.92\">This is what we look like.<\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));grid-auto-rows:210px;gap:16px\">\n      <image-slot id=\"v2-g1\" style=\"grid-column:span 2;grid-row:span 2;width:100%;height:100%\" shape=\"rounded\" radius=\"20\" placeholder=\"Crowd / hero moment\"><\u002Fimage-slot>\n      <image-slot id=\"v2-g2\" style=\"width:100%;height:100%\" shape=\"rounded\" radius=\"20\" placeholder=\"Speaker\"><\u002Fimage-slot>\n      <image-slot id=\"v2-g3\" style=\"width:100%;height:100%\" shape=\"rounded\" radius=\"20\" placeholder=\"Networking\"><\u002Fimage-slot>\n      <image-slot id=\"v2-g4\" style=\"width:100%;height:100%\" shape=\"rounded\" radius=\"20\" placeholder=\"Workshop\"><\u002Fimage-slot>\n      <image-slot id=\"v2-g5\" style=\"width:100%;height:100%\" shape=\"rounded\" radius=\"20\" placeholder=\"Art / culture\"><\u002Fimage-slot>\n      <image-slot id=\"v2-g6\" style=\"grid-column:span 2;width:100%;height:100%\" shape=\"rounded\" radius=\"20\" placeholder=\"Hackathon\"><\u002Fimage-slot>\n      <image-slot id=\"v2-g7\" style=\"width:100%;height:100%\" shape=\"rounded\" radius=\"20\" placeholder=\"City\"><\u002Fimage-slot>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WHAT WE DO -->\n  <section id=\"ncis-what\" style=\"background:#FFF3D6;border-top:2px solid #1A1A1A;border-bottom:2px solid #1A1A1A\">\n    <div style=\"max-width:1280px;margin:0 auto;padding:clamp(56px,8vw,110px) 24px\">\n      <div style=\"font-weight:800;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#C77E00;margin-bottom:12px\">More than meetups<\u002Fdiv>\n      <h2 style=\"font-family:'Londrina Solid',sans-serif;font-weight:900;font-size:clamp(40px,6vw,72px);line-height:0.92;max-width:18ch;margin-bottom:44px\">An ecosystem of ways to gather.<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px\">\n        <sc-for list=\"{{ whatWeDo }}\" as=\"w\" hint-placeholder-count=\"10\">\n          <div style=\"border:2px solid #1A1A1A;border-radius:16px;padding:22px 22px;background:#fff;display:flex;align-items:center;gap:14px\">\n            <span style=\"font-size:28px;line-height:1\">{{ w.icon }}<\u002Fspan>\n            <span style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:800;font-size:18px;line-height:1.05\">{{ w.label }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PROGRAMS -->\n  <section id=\"ncis-programs\" style=\"background:#FFF3D6;border-top:2px solid #1A1A1A;border-bottom:2px solid #1A1A1A\">\n    <div style=\"max-width:1280px;margin:0 auto;padding:clamp(56px,8vw,110px) 24px\">\n      <div style=\"display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:44px\">\n        <div>\n          <div style=\"font-weight:800;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#C77E00;margin-bottom:12px\">Year-round<\u002Fdiv>\n          <h2 style=\"font-family:'Londrina Solid',sans-serif;font-weight:900;font-size:clamp(40px,6vw,72px);line-height:0.92;max-width:16ch\">Ways to stay in it all year.<\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"max-width:32ch;font-size:17px;line-height:1.55;color:#5C5246;font-weight:500\">Events bring us together — programs keep us together. Pick a lane and grow with the community.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px\">\n        <sc-for list=\"{{ programs }}\" as=\"p\" hint-placeholder-count=\"5\">\n          <div style=\"border:2px solid #1A1A1A;border-radius:20px;background:#fff;padding:26px 24px;display:flex;flex-direction:column;gap:14px;box-shadow:5px 6px 0 #1A1A1A;transition:transform .15s ease,box-shadow .15s ease\" style-hover=\"transform:translateY(-5px);box-shadow:8px 11px 0 #1A1A1A\">\n            <div style=\"width:56px;height:56px;border-radius:15px;background:{{ p.color }};border:2px solid #1A1A1A;display:flex;align-items:center;justify-content:center;font-size:28px\">{{ p.icon }}<\u002Fdiv>\n            <h3 style=\"font-family:'Londrina Solid',sans-serif;font-weight:900;font-size:26px;line-height:0.98\">{{ p.title }}<\u002Fh3>\n            <p style=\"font-size:14.5px;line-height:1.55;color:#5C5246;font-weight:500;flex:1\">{{ p.desc }}<\u002Fp>\n            <button onclick=\"{{ goJoin }}\" style=\"align-self:flex-start;background:none;border:none;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;font-weight:800;font-size:15px;color:{{ p.color }};padding:0\">{{ p.cta }} →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PARTNERS -->\n  <section id=\"ncis-partners\" style=\"max-width:1280px;margin:0 auto;padding:clamp(56px,8vw,110px) 24px\">\n    <div style=\"text-align:center;margin-bottom:46px\">\n      <div style=\"font-weight:800;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#E8A317;margin-bottom:10px\">Backed by the ecosystem<\u002Fdiv>\n      <h2 style=\"font-family:'Londrina Solid',sans-serif;font-weight:900;font-size:clamp(38px,5.5vw,64px);line-height:0.95\">Partners &amp; collaborators<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:34px\">\n      <sc-for list=\"{{ partnerGroups }}\" as=\"pg\" hint-placeholder-count=\"5\">\n        <div>\n          <div style=\"font-weight:800;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:#8A857C;margin-bottom:14px\">{{ pg.group }}<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px\">\n            <sc-for list=\"{{ pg.items }}\" as=\"p\" hint-placeholder-count=\"4\">\n              <div style=\"border:2px solid #E2DDD3;border-radius:14px;background:#fff;height:84px;display:flex;align-items:center;justify-content:center;padding:12px\">\n                <span style=\"font-family:'Londrina Solid',sans-serif;font-weight:900;font-size:20px;color:#33312E;text-align:center;line-height:1\">{{ p }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"text-align:center;margin-top:40px\">\n      <button onclick=\"{{ goJoin }}\" style=\"background:#1A1A1A;color:#fff;border:none;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;font-weight:800;font-size:17px;padding:15px 28px;border-radius:14px\">Become a partner →<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- JOIN THE MOVEMENT -->\n  <section id=\"ncis-join\" style=\"background:#E8473F;color:#fff;border-top:2px solid #1A1A1A;position:relative;overflow:hidden\">\n    <div style=\"position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.06) 2px,transparent 2px),linear-gradient(90deg,rgba(255,255,255,0.06) 2px,transparent 2px);background-size:48px 48px\"><\u002Fdiv>\n    <div style=\"position:relative;max-width:1100px;margin:0 auto;padding:clamp(64px,9vw,128px) 24px;text-align:center\">\n      <span onclick=\"{{ wiggleJoin }}\" title=\"⌐◨-◨\" style=\"cursor:pointer;color:#fff;display:inline-block;margin-bottom:24px;filter:drop-shadow(0 6px 0 rgba(0,0,0,0.15));{{ joinAnimStyle }}\">\n        <svg viewBox=\"0 0 64 24\" width=\"150\" height=\"auto\" shape-rendering=\"crispEdges\" style=\"display:block\"><rect x=\"0\" y=\"6\" width=\"4\" height=\"12\" fill=\"currentColor\"><\u002Frect><rect x=\"4\" y=\"2\" width=\"28\" height=\"20\" fill=\"currentColor\"><\u002Frect><rect x=\"32\" y=\"6\" width=\"4\" height=\"12\" fill=\"currentColor\"><\u002Frect><rect x=\"36\" y=\"2\" width=\"28\" height=\"20\" fill=\"currentColor\"><\u002Frect><rect x=\"8\" y=\"6\" width=\"20\" height=\"12\" fill=\"#fff\"><\u002Frect><rect x=\"40\" y=\"6\" width=\"20\" height=\"12\" fill=\"#fff\"><\u002Frect><rect x=\"16\" y=\"6\" width=\"9\" height=\"12\" fill=\"#1A1A1A\"><\u002Frect><rect x=\"48\" y=\"6\" width=\"9\" height=\"12\" fill=\"#1A1A1A\"><\u002Frect><\u002Fsvg>\n      <\u002Fspan>\n      <h2 style=\"font-family:'Londrina Solid',sans-serif;font-weight:900;font-size:clamp(48px,9vw,116px);line-height:0.88;letter-spacing:-1px;text-shadow:0 4px 0 rgba(0,0,0,0.12)\">Join the movement.<\u002Fh2>\n      <p style=\"font-size:clamp(18px,2.2vw,24px);line-height:1.45;font-weight:600;max-width:40ch;margin:20px auto 0;color:#FFE3DF\">Whether you build, create, teach or gather — there's a place for you in Nouns CIS.<\u002Fp>\n      <sc-if value=\"{{ subscribed }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:34px;display:inline-flex;align-items:center;gap:12px;background:#1A1A1A;color:#fff;border-radius:16px;padding:18px 28px;font-weight:800;font-size:18px\">✓ Welcome to the movement. Check your inbox.<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ notSubscribed }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-top:34px;display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:540px;margin-left:auto;margin-right:auto\">\n          <input value=\"{{ email }}\" oninput=\"{{ onEmail }}\" placeholder=\"you@email.com\" style=\"flex:1;min-width:220px;border:2px solid #1A1A1A;border-radius:14px;padding:17px 20px;font-family:'Hanken Grotesk',sans-serif;font-size:17px;font-weight:600;background:#fff;color:#1A1A1A\">\n          <button onclick=\"{{ subscribe }}\" style=\"background:#1A1A1A;color:#fff;border:2px solid #1A1A1A;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;font-weight:800;font-size:17px;padding:17px 30px;border-radius:14px;white-space:nowrap\">Join Nouns CIS<\u002Fbutton>\n        <\u002Fdiv>\n        <p style=\"font-size:13.5px;font-weight:600;color:#FFD9D4;margin-top:14px\">Free to join · events, education and culture in your inbox · никакого спама.<\u002Fp>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fmain>\n<\u002Fsc-if>\n\n<!-- ============ EVENTS DIRECTORY ============ -->\n<sc-if value=\"{{ isEvents }}\" hint-placeholder-val=\"{{ false }}\">\n<main>\n  <section style=\"background:#2B7FFF;color:#fff;border-bottom:2px solid #1A1A1A;overflow:hidden;position:relative\">\n    <div style=\"position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.07) 2px,transparent 2px),linear-gradient(90deg,rgba(255,255,255,0.07) 2px,transparent 2px);background-size:46px 46px\"><\u002Fdiv>\n    <div style=\"position:relative;max-width:1280px;margin:0 auto;padding:clamp(48px,7vw,90px) 24px\">\n      <div style=\"font-weight:800;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#BFD9FF;margin-bottom:14px\">Event directory<\u002Fdiv>\n      <h1 style=\"font-family:'Londrina Solid',sans-serif;font-weight:900;font-size:clamp(48px,8vw,104px);line-height:0.9;letter-spacing:-1px;max-width:14ch\">Find your next Nouns event.<\u002Fh1>\n      <p style=\"font-size:clamp(17px,2vw,21px);line-height:1.5;font-weight:500;max-width:48ch;margin-top:20px;color:#EAF2FF\">Every meetup, hackathon, dinner, screening and summit across the CIS. Filter by country, city, world and format.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"max-width:1280px;margin:0 auto;padding:clamp(32px,5vw,56px) 24px clamp(56px,8vw,100px)\">\n    <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:22px\">\n      <sc-for list=\"{{ whenTabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ t.set }}\" style=\"cursor:pointer;border:2px solid #1A1A1A;border-radius:30px;padding:10px 22px;font-family:'Hanken Grotesk',sans-serif;font-weight:800;font-size:15px;background:{{ t.bg }};color:{{ t.fg }}\">{{ t.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:30px\">\n      <label style=\"display:flex;flex-direction:column;gap:6px\">\n        <span style=\"font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#8A857C\">Country<\u002Fspan>\n        <select value=\"{{ fCountry }}\" onchange=\"{{ onCountry }}\" style=\"border:2px solid #1A1A1A;border-radius:12px;padding:13px 14px;font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:15px;background:#fff;color:#1A1A1A;cursor:pointer\">\n          <sc-for list=\"{{ countryOpts }}\" as=\"o\" hint-placeholder-count=\"3\"><option value=\"{{ o }}\">{{ o }}<\u002Foption><\u002Fsc-for>\n        <\u002Fselect>\n      <\u002Flabel>\n      <label style=\"display:flex;flex-direction:column;gap:6px\">\n        <span style=\"font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#8A857C\">City<\u002Fspan>\n        <select value=\"{{ fCity }}\" onchange=\"{{ onCity }}\" style=\"border:2px solid #1A1A1A;border-radius:12px;padding:13px 14px;font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:15px;background:#fff;color:#1A1A1A;cursor:pointer\">\n          <sc-for list=\"{{ cityOpts }}\" as=\"o\" hint-placeholder-count=\"3\"><option value=\"{{ o }}\">{{ o }}<\u002Foption><\u002Fsc-for>\n        <\u002Fselect>\n      <\u002Flabel>\n      <label style=\"display:flex;flex-direction:column;gap:6px\">\n        <span style=\"font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#8A857C\">World<\u002Fspan>\n        <select value=\"{{ fCat }}\" onchange=\"{{ onCat }}\" style=\"border:2px solid #1A1A1A;border-radius:12px;padding:13px 14px;font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size \n  openCategory = (cat) => { this.setState({ page: 'events', fCat: cat.id, fCity: 'All cities', fCountry: 'All countries', fWhen: 'Upcoming', menuOpen: false }); this._top(); };\n  openCity = (name) => { this.setState({ page: 'events', fCity: name, fCountry: 'All countries', fCat: 'All worlds', fWhen: 'All', menuOpen: false }); this._top(); };\n  setWhen = (w) => this.setState({ fWhen: w });\n  resetFilters = () => this.setState({ fCountry: 'All countries', fCity: 'All cities', fCat: 'All worlds', fWhen: 'Upcoming' });\n  uniq(arr) { return arr.filter((v, i) => arr.indexOf(v) === i); }\n\n  renderVals() {\n    const s = this.state;\n    const decorate = (ev) => ({ ...ev, open: () => this.openEvent(ev) });\n\n    const featured = this.events.filter(e => e.featured).map(decorate);\n\n    let list = this.events.slice();\n    if (s.fWhen === 'Upcoming') list = list.filter(e => !e.past);\n    if (s.fWhen === 'Past') list = list.filter(e => e.past);\n    if (s.fCountry !== 'All countries') list = list.filter(e => e.country === s.fCountry);\n    if (s.fCity !== 'All cities') list = list.filter(e => e.city === s.fCity);\n    if (s.fCat !== 'All worlds') list = list.filter(e => e.category === s.fCat);\n    list.sort((a, b) => s.fWhen === 'Past' ? b.sortKey - a.sortKey : a.sortKey - b.sortKey);\n    const filtered = list.map(decorate);\n\n    const whenTabs = ['Upcoming', 'Past', 'All'].map(label => {\n      const active = s.fWhen === label;\n      return { label, set: () => this.setWhen(label), bg: active ? '#1A1A1A' : '#fff', fg: active ? '#fff' : '#1A1A1A' };\n    });\n\n    const selected = this.events.find(e => e.id === s.selectedId) || this.events[0];\n    const faqRows = this.faqs.map((f, i) => ({ q: f.q, a: f.a, open: s.openFaq === i, sign: s.openFaq === i ? '\\u2212' : '+', toggle: () => this.setFaq(i) }));\n\n    const statItems = this.stats.map(st => ({ label: st.label, color: st.color, value: this.fmt(st.target * s.statP) + (s.statP >= 1 ? st.suffix : '') }));\n\n    const hub = this.mapCities.find(c => c.hub) || this.mapCities[0];\n    const mapLines = this.mapCities.filter(c => !c.hub).map(c => ({ x1: hub.x, y1: hub.y, x2: c.x, y2: c.y }));\n    const mapCities = this.mapCities.map((c, i) => ({\n      name: c.name, country: c.country, x: c.x, y: c.y, color: c.color,\n      r: c.big ? 11 : 8, glow: c.big ? 26 : 20, labelY: c.y - (c.big ? 20 : 16), fontSize: c.big ? 21 : 17,\n      enter: () => this.setState({ hoveredIdx: i }),\n      leave: () => this.setState({ hoveredIdx: -1 }),\n      open: () => this.openCity(c.name),\n    }));\n    const hc = s.hoveredIdx >= 0 ? this.mapCities[s.hoveredIdx] : null;\n    const hov = hc ? { name: hc.name, country: hc.country, color: hc.color, eventsLine: hc.events + ' events hosted', left: (hc.x / 1000 * 100) + '%', top: (hc.y / 520 * 100) + '%' } : { left: '0%', top: '0%' };\n\n    return {\n      isHome: s.page === 'home', isEvents: s.page === 'events', isDetail: s.page === 'detail',\n      isMobile: s.isMobile, desktopNav: !s.isMobile, menuOpen: s.menuOpen && s.isMobile, toggleMenu: this.toggleMenu,\n      goHome: () => { this.spinLogo(); this.go('home'); }, goEvents: () => this.go('events'),\n      goPrograms: () => this.scrollTo('ncis-programs'),\n      programs: this.programs,\n      logoAnimStyle: s.spin ? 'animation:spin 0.72s ease' : '',\n      joinAnimStyle: s.joinWiggle ? 'animation:wiggle 0.64s ease' : 'animation:floaty 5s ease-in-out infinite',\n      goMap: () => this.scrollTo('ncis-map'), goWhat: () => this.scrollTo('ncis-what'),\n      goPartners: () => this.scrollTo('ncis-partners'), goJoin: () => this.scrollTo('ncis-join'),\n\n      statItems,\n      categories: this.categories.map(c => ({ ...c, open: () => this.openCategory(c) })),\n      featured,\n      chapters: this.chapters.map(c => ({ ...c, open: () => this.openCity(c.city) })),\n      activeChapter: (() => { const c = this.chapters[s.activeCity] || this.chapters[0]; return { ...c, open: () => this.openCity(c.city) }; })(),\n      mapMarkers: this.chapters.map((c, i) => {\n        const co = this.chapterCoords[c.name] || { x: 500, y: 280 };\n        const active = i === s.activeCity;\n        return {\n          name: c.name, color: c.color,\n          left: (co.x / 1000 * 100) + '%', top: (co.y / 560 * 100) + '%',\n          scale: active ? 1.28 : 1, labelBg: active ? c.color : '#fff', labelFg: active ? '#fff' : '#1A1A1A',\n          z: active ? 5 : 2, delay: (i * 0.22).toFixed(2) + 's', activate: () => this.setActiveCity(i),\n        };\n      }),\n      whatWeDo: this.whatWeDo,\n      partnerGroups: this.partnerGroups,\n\n      mapLines, mapCities, hovered: s.hoveredIdx >= 0, hov,\n\n      filtered, noResults: filtered.length === 0,\n      resultLine: filtered.length + (filtered.length === 1 ? ' event' : ' events') + ' found',\n      whenTabs,\n      countryOpts: ['All countries'].concat(this.uniq(this.events.map(e => e.country))),\n      cityOpts: ['All cities'].concat(this.uniq(this.events.map(e => e.city))),\n      catOpts: ['All worlds'].concat(this.uniq(this.events.map(e => e.category))),\n      fCountry: s.fCountry, fCity: s.fCity, fCat: s.fCat,\n      onCountry: (e) => this.setState({ fCountry: e.target.value }),\n      onCity: (e) => this.setState({ fCity: e.target.value }),\n      onCat: (e) => this.setState({ fCat: e.target.value }),\n      resetFilters: this.resetFilters,\n\n      selected, detail: this.detail, faqRows,\n      registered: s.registered, notRegistered: !s.registered, register: this.register,\n\n      email: s.email, onEmail: this.onEmail, subscribe: this.subscribe,\n      subscribed: s.subscribed, notSubscribed: !s.subscribed,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
